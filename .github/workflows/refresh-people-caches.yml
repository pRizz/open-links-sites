name: Refresh People Caches

on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  refresh:
    if: github.ref_name == '' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout open-links-sites
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Resolve deploy context
        id: context
        shell: bash
        run: scripts/github-actions/run-and-capture.sh .cache/deploy-context-summary.txt bun run scripts/resolve-deploy-context.ts -- --root "$GITHUB_WORKSPACE" --event-name "$GITHUB_EVENT_NAME"

      - name: Clone upstream open-links
        shell: bash
        env:
          UPSTREAM_REPO_DIR: ${{ runner.temp }}/open-links
          UPSTREAM_COMMIT: ${{ steps.context.outputs.upstream_commit }}
        run: scripts/github-actions/clone-upstream-open-links.sh

      - name: Install open-links-sites dependencies
        run: bun install --frozen-lockfile

      - name: Install upstream open-links dependencies
        shell: bash
        run: scripts/github-actions/install-upstream-open-links-deps.sh

      - name: Refresh people caches
        shell: bash
        run: scripts/github-actions/run-and-capture.sh .cache/refresh-people-caches-summary.txt bun run refresh:people:caches -- --all --root "$GITHUB_WORKSPACE"

      - name: Run check
        shell: bash
        run: scripts/github-actions/run-and-capture.sh .cache/check-summary.txt bun run check

      - name: Run validate
        shell: bash
        run: scripts/github-actions/run-and-capture.sh .cache/validate-summary.txt bun run validate

      - name: Run release verification
        shell: bash
        env:
          PUBLIC_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: scripts/github-actions/run-release-verify.sh

      - name: Commit and push refreshed cache artifacts
        id: commit_cache
        shell: bash
        run: scripts/github-actions/commit-and-push.sh --message "chore(cache): refresh people caches" --output-key pushed -- -A -- ':(glob)people/*/cache/**'

      - name: Trigger Deploy Pages workflow
        if: success() && steps.commit_cache.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: scripts/github-actions/publish-summary-files.sh .cache/deploy-context-summary.txt .cache/refresh-people-caches-summary.txt .cache/check-summary.txt .cache/validate-summary.txt .cache/release-verify-summary.txt

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-people-caches-diagnostics
          path: |
            .cache
            generated/site
            people/*/cache
          if-no-files-found: ignore
          retention-days: 7
