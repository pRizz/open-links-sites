name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "config/**"
      - "people/**"
      - "schemas/**"
      - "scripts/**"
      - "src/**"
      - "templates/**"
      - "bun.lock"
      - "landing.html"
      - "package.json"
      - "tsconfig.json"
      - "vite.landing.config.ts"
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    if: github.ref_name == '' || github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      pages_changed: ${{ steps.release_verify.outputs.pages_changed }}
    steps:
      - name: Checkout open-links-sites
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Resolve deploy context
        id: context
        shell: bash
        run: |
          mkdir -p .cache
          bun run scripts/resolve-deploy-context.ts -- --root "$GITHUB_WORKSPACE" --event-name "$GITHUB_EVENT_NAME" | tee .cache/deploy-context-summary.txt

      - name: Clone upstream open-links
        shell: bash
        run: |
          set -euo pipefail
          upstream_repo_dir="$RUNNER_TEMP/open-links"
          rm -rf "$upstream_repo_dir"
          git clone --filter=blob:none --no-tags https://github.com/pRizz/open-links.git "$upstream_repo_dir"
          git -C "$upstream_repo_dir" checkout --detach "${{ steps.context.outputs.upstream_commit }}"
          echo "OPEN_LINKS_REPO_DIR=$upstream_repo_dir" >> "$GITHUB_ENV"

      - name: Install open-links-sites dependencies
        run: bun install --frozen-lockfile

      - name: Install upstream open-links dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$OPEN_LINKS_REPO_DIR"
          bun install --frozen-lockfile

      - name: Resolve changed paths
        if: steps.context.outputs.use_changed_paths == 'true'
        shell: bash
        run: |
          if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
            git ls-files > .cache/changed-paths.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > .cache/changed-paths.txt
          fi

      - name: Run release verification
        id: release_verify
        shell: bash
        env:
          OPEN_LINKS_SITES_PUBLIC_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          if [[ "${{ steps.context.outputs.use_changed_paths }}" == "true" ]]; then
            bun run release:verify -- --root "$GITHUB_WORKSPACE" --public-origin "$OPEN_LINKS_SITES_PUBLIC_ORIGIN" --event-name "$GITHUB_EVENT_NAME" --changed-paths-file .cache/changed-paths.txt | tee .cache/release-verify-summary.txt
          else
            bun run release:verify -- --root "$GITHUB_WORKSPACE" --public-origin "$OPEN_LINKS_SITES_PUBLIC_ORIGIN" --event-name "$GITHUB_EVENT_NAME" | tee .cache/release-verify-summary.txt
          fi

      - name: Write workflow summary
        shell: bash
        run: |
          cat .cache/deploy-context-summary.txt >> "$GITHUB_STEP_SUMMARY"
          printf '\n' >> "$GITHUB_STEP_SUMMARY"
          cat .cache/release-verify-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        if: steps.release_verify.outputs.pages_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated/site

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pages-diagnostics
          path: |
            .cache
            generated/site
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    if: needs.build.outputs.pages_changed == 'true'
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
