name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - "config/**"
      - "people/**"
      - "schemas/**"
      - "scripts/**"
      - "src/**"
      - "templates/**"
      - "bun.lock"
      - "landing.html"
      - "package.json"
      - "tsconfig.json"
      - "vite.landing.config.ts"
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    if: github.ref_name == '' || github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      pages_changed: ${{ steps.release_verify.outputs.pages_changed }}
    steps:
      - name: Checkout open-links-sites
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Resolve deploy context
        id: context
        shell: bash
        run: scripts/github-actions/run-and-capture.sh .cache/deploy-context-summary.txt bun run scripts/resolve-deploy-context.ts -- --root "$GITHUB_WORKSPACE" --event-name "$GITHUB_EVENT_NAME"

      - name: Clone upstream open-links
        shell: bash
        env:
          UPSTREAM_REPO_DIR: ${{ runner.temp }}/open-links
          UPSTREAM_COMMIT: ${{ steps.context.outputs.upstream_commit }}
        run: scripts/github-actions/clone-upstream-open-links.sh

      - name: Install open-links-sites dependencies
        run: bun install --frozen-lockfile

      - name: Install upstream open-links dependencies
        shell: bash
        run: scripts/github-actions/install-upstream-open-links-deps.sh

      - name: Resolve changed paths
        if: steps.context.outputs.use_changed_paths == 'true'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: scripts/github-actions/resolve-changed-paths.sh

      - name: Run release verification
        id: release_verify
        shell: bash
        env:
          PUBLIC_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          CHANGED_PATHS_FILE: ${{ steps.context.outputs.use_changed_paths == 'true' && '.cache/changed-paths.txt' || '' }}
        run: scripts/github-actions/run-release-verify.sh

      - name: Write workflow summary
        shell: bash
        run: scripts/github-actions/publish-summary-files.sh .cache/deploy-context-summary.txt .cache/release-verify-summary.txt

      - name: Upload Pages artifact
        if: steps.release_verify.outputs.pages_changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: generated/site

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pages-diagnostics
          path: |
            .cache
            generated/site
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    if: needs.build.outputs.pages_changed == 'true'
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
