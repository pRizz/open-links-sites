name: Refresh External OpenLinks

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  refresh:
    if: github.ref_name == '' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout open-links-sites
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Resolve deploy context
        id: context
        shell: bash
        run: |
          mkdir -p .cache
          bun run scripts/resolve-deploy-context.ts -- --root "$GITHUB_WORKSPACE" --event-name "$GITHUB_EVENT_NAME" | tee .cache/deploy-context-summary.txt

      - name: Clone upstream open-links
        shell: bash
        run: |
          set -euo pipefail
          upstream_repo_dir="$RUNNER_TEMP/open-links"
          rm -rf "$upstream_repo_dir"
          git clone --filter=blob:none --no-tags https://github.com/pRizz/open-links.git "$upstream_repo_dir"
          git -C "$upstream_repo_dir" checkout --detach "${{ steps.context.outputs.upstream_commit }}"
          echo "OPEN_LINKS_REPO_DIR=$upstream_repo_dir" >> "$GITHUB_ENV"

      - name: Install open-links-sites dependencies
        run: bun install --frozen-lockfile

      - name: Install upstream open-links dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd "$OPEN_LINKS_REPO_DIR"
          bun install --frozen-lockfile

      - name: Refresh external OpenLinks cache
        shell: bash
        run: |
          set -euo pipefail
          bun run refresh:landing:external -- --root "$GITHUB_WORKSPACE" | tee .cache/refresh-external-openlinks-summary.txt

      - name: Run check
        shell: bash
        run: |
          set -euo pipefail
          bun run check | tee .cache/check-summary.txt

      - name: Run validate
        shell: bash
        run: |
          set -euo pipefail
          bun run validate | tee .cache/validate-summary.txt

      - name: Run release verification
        shell: bash
        env:
          OPEN_LINKS_SITES_PUBLIC_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          bun run release:verify -- --root "$GITHUB_WORKSPACE" --public-origin "$OPEN_LINKS_SITES_PUBLIC_ORIGIN" --event-name "$GITHUB_EVENT_NAME" | tee .cache/release-verify-summary.txt

      - name: Commit and push refreshed landing artifacts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/landing
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(landing): refresh external OpenLinks cache"
          git push origin HEAD:main

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          for file in \
            .cache/deploy-context-summary.txt \
            .cache/refresh-external-openlinks-summary.txt \
            .cache/check-summary.txt \
            .cache/validate-summary.txt \
            .cache/release-verify-summary.txt; do
            if [[ -f "$file" ]]; then
              cat "$file" >> "$GITHUB_STEP_SUMMARY"
              printf '\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-external-openlinks-diagnostics
          path: |
            .cache
            config/landing
            generated/site
          if-no-files-found: ignore
          retention-days: 7
