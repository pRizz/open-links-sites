name: Upstream Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  # Required so we can dispatch Deploy Pages after pushing; pushes via GITHUB_TOKEN do not trigger other workflows.
  actions: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.ref_name == '' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout open-links-sites
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Preflight upstream HEAD check
        id: preflight
        shell: bash
        run: scripts/github-actions/preflight-upstream-head.sh

      - name: Setup Bun
        if: steps.preflight.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Clone upstream open-links
        if: steps.preflight.outputs.changed == 'true'
        shell: bash
        env:
          UPSTREAM_REPO_DIR: ${{ runner.temp }}/open-links
          UPSTREAM_BRANCH: main
        run: scripts/github-actions/clone-upstream-open-links.sh

      - name: Install open-links-sites dependencies
        if: steps.preflight.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Install upstream open-links dependencies
        if: steps.preflight.outputs.changed == 'true'
        shell: bash
        run: scripts/github-actions/install-upstream-open-links-deps.sh

      - name: Sync pinned upstream state
        if: steps.preflight.outputs.changed == 'true'
        id: sync
        shell: bash
        run: scripts/github-actions/run-and-capture.sh .cache/upstream-sync-summary.txt bun run sync:upstream -- --root "$GITHUB_WORKSPACE" --upstream-repo-dir "$OPEN_LINKS_REPO_DIR"

      - name: Verify releasable state
        if: steps.preflight.outputs.changed == 'true' && steps.sync.outputs.sync_result == 'changed'
        shell: bash
        env:
          PUBLIC_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: scripts/github-actions/run-release-verify.sh

      - name: Commit and push synced upstream state
        if: steps.preflight.outputs.changed == 'true' && steps.sync.outputs.sync_result == 'changed'
        shell: bash
        run: >-
          scripts/github-actions/commit-and-push.sh
          --message "chore(upstream): sync open-links to ${{ steps.sync.outputs.sync_latest_commit }}"
          --
          config/upstream-open-links.json

      - name: Trigger Deploy Pages workflow
        if: success() && steps.preflight.outputs.changed == 'true' && steps.sync.outputs.sync_result == 'changed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: scripts/github-actions/publish-summary-files.sh .cache/upstream-preflight-summary.txt .cache/upstream-sync-summary.txt .cache/release-verify-summary.txt

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-sync-diagnostics
          path: |
            .cache
            config/upstream-open-links.json
            generated/site
          if-no-files-found: ignore
          retention-days: 7
