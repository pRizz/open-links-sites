name: Upstream Sync

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  sync:
    if: github.ref_name == '' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout open-links-sites
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Preflight upstream HEAD check
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache
          tracked_commit="$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path("config/upstream-open-links.json").read_text(encoding="utf8"))["commit"])')"
          latest_commit="$(git ls-remote https://github.com/pRizz/open-links.git refs/heads/main | awk '{print $1}')"
          if [[ -z "$latest_commit" ]]; then
            echo "Unable to resolve upstream open-links main HEAD." >&2
            exit 1
          fi

          changed=true
          action="continue with full upstream sync"
          if [[ "$tracked_commit" == "$latest_commit" ]]; then
            changed=false
            action="skip clone/install/verify because the pinned upstream commit is already current"
          fi

          {
            echo "changed=$changed"
            echo "tracked_commit=$tracked_commit"
            echo "latest_commit=$latest_commit"
          } >> "$GITHUB_OUTPUT"

          printf '%s\n' \
            '## Upstream Preflight' \
            "- Tracked commit: \`${tracked_commit:0:12}\`" \
            "- Latest commit: \`${latest_commit:0:12}\`" \
            "- Upstream changed: \`${changed}\`" \
            "- Action: ${action}" \
            > .cache/upstream-preflight-summary.txt

      - name: Setup Bun
        if: steps.preflight.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Clone upstream open-links
        if: steps.preflight.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          upstream_repo_dir="$RUNNER_TEMP/open-links"
          rm -rf "$upstream_repo_dir"
          git clone --filter=blob:none --no-tags --branch main https://github.com/pRizz/open-links.git "$upstream_repo_dir"
          echo "OPEN_LINKS_REPO_DIR=$upstream_repo_dir" >> "$GITHUB_ENV"

      - name: Install open-links-sites dependencies
        if: steps.preflight.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Install upstream open-links dependencies
        if: steps.preflight.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "$OPEN_LINKS_REPO_DIR"
          bun install --frozen-lockfile

      - name: Sync pinned upstream state
        if: steps.preflight.outputs.changed == 'true'
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cache
          bun run sync:upstream -- --root "$GITHUB_WORKSPACE" --upstream-repo-dir "$OPEN_LINKS_REPO_DIR" | tee .cache/upstream-sync-summary.txt

      - name: Verify releasable state
        if: steps.preflight.outputs.changed == 'true' && steps.sync.outputs.sync_result == 'changed'
        shell: bash
        env:
          OPEN_LINKS_SITES_PUBLIC_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          bun run release:verify -- --root "$GITHUB_WORKSPACE" --public-origin "$OPEN_LINKS_SITES_PUBLIC_ORIGIN" --event-name "$GITHUB_EVENT_NAME" | tee .cache/release-verify-summary.txt

      - name: Commit and push synced upstream state
        if: steps.preflight.outputs.changed == 'true' && steps.sync.outputs.sync_result == 'changed'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/upstream-open-links.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(upstream): sync open-links to ${{ steps.sync.outputs.sync_latest_commit }}"
          git push origin HEAD:main

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          if [[ -f .cache/upstream-preflight-summary.txt ]]; then
            cat .cache/upstream-preflight-summary.txt >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -f .cache/upstream-sync-summary.txt ]]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat .cache/upstream-sync-summary.txt >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -f .cache/release-verify-summary.txt ]]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat .cache/release-verify-summary.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: upstream-sync-diagnostics
          path: |
            .cache
            config/upstream-open-links.json
            generated/site
          if-no-files-found: ignore
          retention-days: 7
